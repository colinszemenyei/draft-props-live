services:
  - type: web
    name: draft-props-live
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build && cp -r public .next/standalone/public && cp -r .next/static .next/standalone/.next/static
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: Commissioner
      - key: ADMIN_PASSWORD
        sync: false
      - key: DRAFT_YEAR
        value: "2026"
      - key: NEXT_PUBLIC_DRAFT_YEAR
        value: "2026"
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
